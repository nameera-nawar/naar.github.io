<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAAR | Product</title>

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#fffdf9;
  color:#2d2d2d;
}

/* HEADER */
header{
  background:white;
  padding:20px;
  display:flex;
  justify-content:center;
  border-bottom:1px solid #f1eae0;
  position:sticky;
  top:0;
  z-index:1000;
}

header img{ height:45px; }

/* PRODUCT */
.product-container{
  max-width:1200px;
  margin:80px auto;
  display:flex;
  gap:80px;
  padding:0 30px;
  flex-wrap:wrap;
}

.product-gallery{
  flex:1;
  min-width:320px;
}

.main-image{
  width:100%;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(255,192,203,0.15);
}

.product-details{
  flex:1;
  min-width:320px;
}

.product-details h1{
  font-size:2.2rem;
  font-weight:500;
  margin:0;
}

.price{
  font-size:1.4rem;
  color:#c78da3;
  margin:15px 0;
}

.desc{
  color:#777;
  line-height:1.7;
  margin-bottom:30px;
}

select{
  width:100%;
  padding:14px;
  margin-top:8px;
  border-radius:14px;
  border:1px solid #f0d8e2;
}

button{
  width:100%;
  padding:16px;
  margin-top:20px;
  border:none;
  border-radius:20px;
  font-size:1rem;
  cursor:pointer;
  transition:0.3s ease;
}

.add-btn{
  background:#f5c6d6;
}

.add-btn:hover{
  background:#f2b3c8;
}

.whatsapp-btn{
  background:#e9f7ef;
}

.whatsapp-btn:hover{
  background:#d4f3df;
}

.trust{
  margin-top:20px;
  font-size:0.9rem;
  color:#999;
}

/* RELATED */
.related-section{
  max-width:1200px;
  margin:100px auto;
  padding:0 30px;
}

.related-section h2{
  text-align:center;
  font-weight:500;
  margin-bottom:40px;
  color:#c78da3;
}

.related-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:30px;
}

.related-card{
  background:white;
  border-radius:20px;
  padding:15px;
  text-align:center;
  cursor:pointer;
  transition:0.3s ease;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.related-card:hover{
  transform:translateY(-5px);
}

.related-card img{
  width:100%;
  border-radius:15px;
  height:260px;
  object-fit:cover;
}

.related-name{
  margin-top:15px;
}

.related-price{
  color:#c78da3;
  margin-top:5px;
}

/* CART */
#cart{
  position:fixed;
  right:25px;
  bottom:25px;
  background:#f5c6d6;
  padding:14px 22px;
  border-radius:30px;
}

#cart-count{
  background:white;
  border-radius:50%;
  padding:3px 8px;
  font-size:0.8rem;
  margin-left:6px;
}

/* POPUP */
.success-popup{
  position:fixed;
  top:20px;
  right:-300px;
  background:#f5c6d6;
  padding:14px 22px;
  border-radius:20px;
  transition:0.5s ease;
}

.success-popup.show{
  right:20px;
}

@media(max-width:768px){
  .product-container{
    flex-direction:column;
    gap:50px;
  }
}
</style>
</head>

<body>

<header>
  <img src="hero.png">
</header>

<div class="product-container">
  <div class="product-gallery">
    <img id="mainImage" class="main-image">
  </div>

  <div class="product-details">
    <h1 id="productName"></h1>
    <div class="price" id="productPrice"></div>
    <div class="desc" id="productDesc"></div>

    <select id="sizeSelect">
      <option value="">Select Size</option>
      <option>S – 38</option>
      <option>M – 40</option>
      <option>L – 42</option>
      <option>XL – 44</option>
      <option>XXL – 46</option>
    </select>

    <button class="add-btn" id="addCartBtn">Add to Cart</button>
    <button class="whatsapp-btn" id="whatsappBtn">Order via WhatsApp</button>

    <div class="trust">
      Free delivery inside Chattogram • 3-5 working days
    </div>
  </div>
</div>

<section class="related-section">
  <h2>You May Also Like</h2>
  <div class="related-grid" id="relatedGrid"></div>
</section>

<div id="cart">Cart <span id="cart-count">0</span></div>
<div class="success-popup" id="successPopup">Added to cart ♡</div>

<script>

const products={
  sumya:{name:"SUMYA KURTI",price:550,desc:"Soft feminine embroidered kurti.",img:"https://images.unsplash.com/photo-1594633312681-425c7b97ccd1"},
  naima:{name:"NAIMA SET",price:650,desc:"Elegant pastel kurti set.",img:"https://images.unsplash.com/photo-1620799140408-edc6dcb6d633"},
  aliza:{name:"ALIZA KURTI",price:500,desc:"Minimal everyday kurti.",img:"https://images.unsplash.com/photo-1618354691438-25bc04584c23"},
  zara:{name:"ZARA SET",price:700,desc:"Modern coordinated set.",img:"https://images.unsplash.com/photo-1618354691605-c8e56b798a0d"}
};

/* SAFE AUTO LOAD */
const params=new URLSearchParams(window.location.search);
let key=params.get("name");

if(!products[key]){
  key=Object.keys(products)[0]; // auto load first product
}

const product=products[key];

document.getElementById("productName").innerText=product.name;
document.getElementById("productPrice").innerText=`TAKA ${product.price}`;
document.getElementById("productDesc").innerText=product.desc;
document.getElementById("mainImage").src=product.img;

/* RELATED */
const relatedGrid=document.getElementById("relatedGrid");
Object.keys(products).forEach(p=>{
  if(p!==key){
    const item=products[p];
    const card=document.createElement("div");
    card.className="related-card";
    card.innerHTML=`
      <img src="${item.img}">
      <div class="related-name">${item.name}</div>
      <div class="related-price">TAKA ${item.price}</div>
    `;
    card.onclick=()=>window.location.href=`product.html?name=${p}`;
    relatedGrid.appendChild(card);
  }
});

/* CART */
let cart=JSON.parse(localStorage.getItem("cart"))||[];

function updateCartCount(){
  document.getElementById("cart-count").innerText=
    cart.reduce((t,i)=>t+i.qty,0);
}
updateCartCount();

document.getElementById("addCartBtn").onclick=()=>{
  const size=document.getElementById("sizeSelect").value;
  if(!size) return;

  const existing=cart.find(i=>i.name===product.name && i.size===size);
  if(existing) existing.qty++;
  else cart.push({name:product.name,size,price:product.price,qty:1});

  localStorage.setItem("cart",JSON.stringify(cart));
  updateCartCount();

  const popup=document.getElementById("successPopup");
  popup.classList.add("show");
  setTimeout(()=>popup.classList.remove("show"),2000);
};

/* WHATSAPP */
document.getElementById("whatsappBtn").onclick=()=>{
  const size=document.getElementById("sizeSelect").value;
  if(!size) return;

  const message=
`Hello NAAR,
I want to order:

Product: ${product.name}
Size: ${size}
Price: TAKA ${product.price}`;

  window.open(`https://wa.me/8801819638383?text=${encodeURIComponent(message)}`,"_blank");
};

</script>

</body>
</html>
